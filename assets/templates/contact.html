<section id="contacto" class="py-24 bg-white" data-aos="fade-in">
  <div class="max-w-4xl mx-auto px-4">
    <h2 class="text-4xl font-extrabold mb-10 text-center text-[#16194a]" data-aos="fade-up" data-aos-delay="100">
      Contáctanos
    </h2>
    <div class="flex flex-col md:flex-row items-center justify-center gap-10" data-aos="fade-up" data-aos-delay="200">
      <div class="md:w-1/2 flex justify-center mb-8 md:mb-0">
        <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?auto=format&fit=crop&w=400&q=80" class="rounded-2xl w-60 h-60 object-cover shadow-xl border-4 border-blue-100 transition-transform hover:scale-105" alt="Contacto Nexora"/>
      </div>
      <form class="md:w-1/2 bg-white rounded-2xl p-8 shadow-xl border border-blue-100 text-gray-800 space-y-5" data-aos="fade-in" data-aos-delay="300">
        <div>
          <label class="block mb-2 font-semibold text-blue-900">Nombre</label>
          <input type="text" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-300" placeholder="Tu nombre" required/>
        </div>
        <div>
          <label class="block mb-2 font-semibold text-blue-900">Correo electrónico</label>
          <input type="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-300" placeholder="tucorreo@email.com" required/>
        </div>
        <div>
          <label class="block mb-2 font-semibold text-blue-900">Mensaje</label>
          <textarea class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all duration-300" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
        </div>
        <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
          ¡Mensaje enviado exitosamente! Nos pondremos en contacto contigo pronto.
        </div>
        <button type="submit" class="w-full bg-[#16194a] text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-all duration-300 hover:scale-105 text-lg shadow-md">
          Enviar mensaje
        </button>
      </form>
    </div>
  </div>
</section>
