<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexora Blog - Detalle del artículo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/assets/js/detalle-post.js"></script>
  </head>

  <body class="bg-gray-50 text-gray-800">
    <!-- Include global header -->
    <div id="header-placeholder"></div>
    <script>
      fetch("/assets/templates/header.html")
        .then((response) => response.text())
        .then((html) => {
          document.getElementById("header-placeholder").innerHTML = html;
        });
    </script>

    <!-- Contenido del post -->
    <main class="max-w-4xl mx-auto px-6 py-12">
      <!-- Botón volver -->
      <a
        href="blog.html"
        class="text-blue-600 hover:underline mb-6 inline-block"
        >← Volver al Blog</a
      >

      <!-- Imagen principal -->
      <img
        src=""
        alt=""
        class="w-full h-80 object-cover rounded-xl shadow mb-10"
      />

      <!-- Cuerpo del artículo -->
      <article class="prose prose-lg max-w-none text-gray-700"></article>

      <!-- Comentarios -->
      <section class="mt-16">
        <h2 class="text-2xl font-bold text-[#16194a] mb-6">Comentarios</h2>

        <!-- Contenedor de comentarios existentes -->
        <div id="comentarios-container" class="mb-8"></div>

        <!-- Formulario de comentario -->
        <form
          id="comentario-form"
          class="bg-white p-6 rounded-xl shadow space-y-4"
        >
          <textarea
            id="mensaje-comentario"
            class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
            rows="4"
            placeholder="Escribe tu comentario..."
          ></textarea>
          <div class="flex items-center space-x-4">
            <input
              type="text"
              id="nombre-comentario"
              class="border rounded-lg p-2 flex-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
              placeholder="Tu nombre (opcional)"
            />
            <label class="flex items-center space-x-2">
              <input type="checkbox" id="anonimo-comentario" />
              <span class="text-gray-600 text-sm">Comentar como anónimo</span>
            </label>
          </div>
          <button
            type="submit"
            class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-400"
          >
            Enviar comentario
          </button>
        </form>
      </section>
    </main>

    <!-- Footer -->
    <footer class="bg-[#16194a] text-white py-10 mt-20">
      <div class="max-w-6xl mx-auto px-6 text-center">
        <p class="mb-4 font-semibold">
          © 2025 Nexora - Todos los derechos reservados
        </p>
        <div class="flex justify-center space-x-6 text-sm">
          <a href="#" class="hover:underline">Política de privacidad</a>
          <a href="#" class="hover:underline">Términos de uso</a>
        </div>
      </div>
    </footer>
  </body>
</html>
